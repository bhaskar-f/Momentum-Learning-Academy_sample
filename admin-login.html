<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login — ABC Coaching</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/momentumlogo.png" />

    <style>
      /* small page-level overrides */
      .auth-card {
        max-width: 420px;
        margin: 60px auto;
        padding: 28px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      .auth-card h2 {
        color: #003161;
        margin-bottom: 12px;
      }
      .form-row {
        margin-bottom: 12px;
      }
      .form-row input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #e6eef8;
      }
      .btn-primary {
        background: #436a91;
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h2>Admin Login</h2>
      <form id="adminLoginForm">
        <div class="form-row">
          <input id="email" type="email" placeholder="Admin email" required />
        </div>
        <div class="form-row">
          <input
            id="password"
            type="password"
            placeholder="Password"
            required
          />
        </div>
        <div
          style="
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
          "
        >
          <button class="btn-primary" type="submit">Login</button>

          <a href="login.html" id="rollSwitchBtn">Student login</a>
        </div>
        <a
          href="admin-forgot-password.html"
          style="display: block; margin-top: 20px; text-align: center"
          >Forgot Password?</a
        >
      </form>
      <div id="adminMsg" style="margin-top: 12px; color: #d9534f"></div>
    </div>

    <script src="js/auth/admin-login.js"></script>
  </body>
</html>
