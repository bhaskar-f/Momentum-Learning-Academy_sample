<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles/admin-login.css" />
    <link rel="icon" type="image/png" href="images/momentumlogo.png" />
  </head>
  <body>
    <div class="auth-card">
      <h2>Admin Login</h2>
      <form id="adminLoginForm">
        <div class="form-row">
          <input id="email" type="email" placeholder="Admin email" required />
        </div>
        <div class="form-row">
          <input
            id="password"
            type="password"
            placeholder="Password"
            required
          />
        </div>
        <div
          style="
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
          "
        >
          <button class="btn-primary" type="submit">Login</button>

          <a href="login.html" id="rollSwitchBtn">Student login</a>
        </div>
      </form>
      <div class="extraLinks">
        <a
          href="admin-forgot-password.html"
          style="display: block; margin-top: 20px; text-align: center"
          >Forgot Password?</a
        >
      </div>
      <div id="adminMsg" style="margin-top: 12px; color: #d9534f"></div>
    </div>

    <script src="js/auth/admin-login.js"></script>
  </body>
</html>
