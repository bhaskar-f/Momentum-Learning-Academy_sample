<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Student Dashboard — ABC Coaching</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="student-dashboard.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <div class="dashboard-nav">
        <a href="student-dashboard.html">My Dashboard</a>
        <a href="course-registration.html">Register Course</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>

      <div class="card">
        <h2>Hello, <span id="stuName">Student</span></h2>
        <p class="small-muted">
          Here are your registered courses and transactions.
        </p>

        <h3 style="margin-top: 18px">My Courses</h3>
        <div class="courses-grid" id="myCourses"></div>

        <h3 style="margin-top: 18px">Transactions</h3>
        <table id="transactionsTable" class="dashboard-table">
          <!-- <table class="tx-table" id="txTable"> -->
          <thead>
            <tr>
              <th>Date</th>
              <th>Course</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Receipt</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script src="js/student-dashboard.js"></script>
  </body>
</html>
