<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum Learning Academy</title>
    <link rel="stylesheet" href="styles/admin-forgot-password.css" />
    <link rel="icon" type="image/png" href="./images/momentumlogo.png" />
  </head>
  <body>
    <div class="auth-card">
      <h2>Admin Password Reset</h2>
      <form
        action="/api/auth/forgot-password"
        method="post"
        id="adminForgotForm"
      >
        <div class="form-row">
          <input type="email" id="email" placeholder="Admin Email" required />
        </div>
        <button class="btn-primary" type="submit">Send Reset Link</button>
      </form>
      <div class="extraLinks">
        <a href="admin-login.html">Back to Login</a>
      </div>
    </div>

    <script src="js/auth/admin-forgot.js"></script>
  </body>
</html>
