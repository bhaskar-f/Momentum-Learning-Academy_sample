<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery - Coaching Center</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <section id="full-gallery" class="py-5 bg-light">
      <div class="container">
        <h2 class="text-center mb-4">Our Complete Gallery</h2>
        <div class="row g-3">
          <div class="col-6 col-md-3">
            <img
              src="images/gallery1.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 1"
            />
          </div>
          <div class="col-6 col-md-3">
            <img
              src="images/gallery2.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 2"
            />
          </div>
          <div class="col-6 col-md-3">
            <img
              src="images/gallery3.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 3"
            />
          </div>
          <div class="col-6 col-md-3">
            <img
              src="images/gallery4.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 4"
            />
          </div>
          <div class="col-6 col-md-3">
            <img
              src="images/gallery5.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 5"
            />
          </div>
          <div class="col-6 col-md-3">
            <img
              src="images/galley6.jpeg"
              class="img-fluid rounded shadow-sm"
              alt="Gallery 6"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
