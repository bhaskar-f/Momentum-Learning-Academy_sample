<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum Learning Academy</title>
    <link rel="stylesheet" href="styles/forgot-password.css" />
    <link rel="icon" type="image/png" href="images/momentumlogo.png" />
  </head>
  <body>
    <div class="auth-card">
      <h2>Student Password Reset</h2>
      <form
        action="/api/auth/forgot-password"
        method="post"
        id="studentForgotForm"
      >
        <div class="form-row">
          <input
            type="email"
            id="studentEmail"
            placeholder="Enter your registered email"
            required
          />
        </div>

        <button
          style="display: block; margin: auto"
          class="btn-primary"
          type="submit"
        >
          Send Reset Link
        </button>
      </form>
      <div class="extraLinks">
        <a
          href="login.html"
          style="display: block; margin-top: 15px; text-align: center"
          >Back to Login</a
        >
      </div>
    </div>

    <script src="js/auth/student-forgot.js"></script>
  </body>
</html>
